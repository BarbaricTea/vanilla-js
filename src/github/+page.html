<h1>Search for github user</h1>
<div class="container">
  <div class="search">
    <p>Username:</p>
    <input class="input" id="user_input" type="text" />
    <button class="button" id="btn_search">Search</button>
  </div>
  <div class="results" id="results">
    <img class="image" id="user_img" />
    <h3 id="name"></h3>
    <h4 id="username"></h4>
    <p id="bio"></p>
    <div>
      <p class="gray"><span id="followers"></span> followers</p>
      <p class="gray"><span id="following"></span> following</p>
    </div>
    <p id="location"></p>
    <div class="border-top">
      <span>Public repos: </span>
      <p id="link"></p>
    </div>
  </div>
</div>
